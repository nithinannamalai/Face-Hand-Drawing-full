<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraDraw | AI Hand Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Noto+Sans+Meroitic&family=Playwrite+NZ+Guides&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --surface: rgba(24, 24, 27, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
    }
    
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top right, #1e1b4b, #09090b);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2.5rem;
      background: rgba(9, 9, 11, 0.8);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #d8b4fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .nav-guide {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      transition: all 0.2s ease;
    }
    .nav-guide:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .container {
      display: flex;
      flex-direction: row;
      flex: 1;
      gap: 1.5rem;
      padding: 1.5rem 2.5rem;
      height: calc(100vh - 70px);
      box-sizing: border-box;
    }

    .sidebar {
      width: 340px;
      padding: 1.5rem;
      background: var(--surface);
      -webkit-backdrop-filter: blur(24px);
      backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    .color-grid {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }
    
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.active {
      border-color: white;
      transform: scale(1.1);
      box-shadow: 0 0 12px currentColor;
    }

    .color-picker-wrapper {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      display: inline-block;
      box-sizing: border-box;
    }
    .color-picker-wrapper:hover { transform: scale(1.15); }
    .color-picker-wrapper.active {
      border-color: white;
      transform: scale(1.1);
      box-shadow: 0 0 12px var(--current-custom-color, white);
    }
    .color-picker-wrapper input[type="color"] {
      position: absolute;
      top: -10px;
      left: -10px;
      width: 50px;
      height: 50px;
      opacity: 0;
      cursor: pointer;
    }

    .action-btn {
      padding: 0.5rem 0.8rem;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      flex: 1 1 45%;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }

    .action-btn.danger {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }
    .action-btn.danger:hover { background: rgba(239, 68, 68, 0.15); }
    
    .action-btn.success {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
    }
    .action-btn.success:hover { background: rgba(16, 185, 129, 0.15); }

    .slider-container { width: 100%; }
    input[type=range] { width: 100%; accent-color: var(--primary); margin-top: 0.5rem; }
    
    .bg-segment {
      display: flex; background: rgba(0,0,0,0.4);
      border-radius: 10px; overflow: hidden;
      flex-wrap: wrap; border: 1px solid var(--glass-border);
    }
    .bg-btn {
      flex: 1 1 30%; padding: 0.4rem; border: none; background: transparent;
      color: var(--text-muted); cursor: pointer; font-size: 0.75rem;
      font-weight: 500; transition: all 0.2s;
    }
    .bg-btn:hover { color: white; background: rgba(255,255,255,0.05); }
    .bg-btn.active { background: var(--primary); color: white; }

    .guide-card {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 0.6rem 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.4rem;
      flex: 1 1 45%;
    }

    .feed-container {
      flex: 1;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      border: 1px solid var(--glass-border);
      background: #000;
    }

    .feed-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .status-badge {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(8px);
    }
    
    .pulse {
      width: 6px;
      height: 6px;
      background: #34d399;
      border-radius: 50%;
      box-shadow: 0 0 8px #34d399;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
      70% { box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .palette-modal {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      padding: 1.5rem;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalPop {
      0% { opacity: 0; transform: scale(0.95) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">AuraDraw Web ✨</div>
    <div style="display:flex; gap:1rem; align-items:center;">
      <div class="nav-guide" title="Draw">
        <span style="font-size:1.2rem; margin-right:0.4rem;">☝️</span>
        <span style="font-size:0.85rem; font-weight:600; color:var(--text-muted);">Draw</span>
      </div>
      <div class="nav-guide" title="Pause / Move Cursor">
        <span style="font-size:1.2rem; margin-right:0.4rem;">✌️</span>
        <span style="font-size:0.85rem; font-weight:600; color:var(--text-muted);">Pause</span>
      </div>
      <div class="nav-guide" title="Clear Canvas">
        <span style="font-size:1.2rem; margin-right:0.4rem;">🖐️</span>
        <span style="font-size:0.85rem; font-weight:600; color:var(--text-muted);">Clear</span>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="sidebar">
      <div>
        <div class="section-title">Brush Color</div>
        <div class="color-grid">
          <button class="color-btn active" style="background:#EF4444; color:#EF4444;" onclick="setColor('red', this)"></button>
          <button class="color-btn" style="background:#3B82F6; color:#3B82F6;" onclick="setColor('blue', this)"></button>
          <button class="color-btn" style="background:#10B981; color:#10B981;" onclick="setColor('green', this)"></button>
          <button class="color-btn" style="background:#F59E0B; color:#F59E0B;" onclick="setColor('yellow', this)"></button>
          <button class="color-btn" style="background:#8B5CF6; color:#8B5CF6;" onclick="setColor('purple', this)"></button>
          <button class="color-btn" style="background:#EC4899; color:#EC4899;" onclick="setColor('pink', this)"></button>
          <button class="color-btn" style="background:#06B6D4; color:#06B6D4;" onclick="setColor('cyan', this)"></button>
          <button class="color-btn" style="background:#F97316; color:#F97316;" onclick="setColor('orange', this)"></button>
          <button class="color-btn" style="background:#FFFFFF; color:#FFFFFF;" onclick="setColor('white', this)"></button>
          <button class="color-btn" style="background:conic-gradient(red, yellow, lime, aqua, blue, magenta, red); color:white;" onclick="setColor('rainbow', this)" title="Rainbow Brush"></button>
          <div class="color-picker-wrapper" id="colorPickerWrapper" title="Custom RGB Color">
            <input type="color" id="customColorPicker" oninput="setCustomColor(this.value)" onchange="setCustomColor(this.value)" value="#ff0000">
          </div>
          <button class="color-btn" style="background:rgba(255,255,255,0.1); color:white; font-size:12px; border-radius:8px; width:auto; padding:0 10px; height:32px; border:1px solid rgba(255,255,255,0.2); font-weight:600;" onclick="openPaletteModal()" title="Advanced Hex Palette">🎨 Palette</button>
        </div>
      </div>

      <div>
        <div class="section-title">Brush Style</div>
        <div class="slider-container">
          <label style="font-size:0.8rem; color:#94A3B8; display:flex; justify-content:space-between;">
            <span>Thickness</span>
            <span id="brushSizeViewer">6px</span>
          </label>
          <input type="range" min="2" max="60" value="6" oninput="setThickness(this.value)" />
        </div>
      </div>

      <div>
        <div class="section-title">Brush / Shape</div>
        <div class="bg-segment">
          <button class="style-btn bg-btn active" onclick="setStyle('normal', this)">Draw</button>
          <button class="style-btn bg-btn" onclick="setStyle('straight', this)">Line</button>
          <button class="style-btn bg-btn" onclick="setStyle('dotted', this)">Dotted</button>
          <button class="style-btn bg-btn" onclick="setStyle('rectangle', this)">Rect</button>
          <button class="style-btn bg-btn" onclick="setStyle('circle', this)">Circle</button>
        </div>
      </div>

      <div>
        <div class="section-title">Background</div>
        <div class="bg-segment">
          <button class="bg-mode-btn bg-btn active" onclick="setBg('camera', this)">Camera</button>
          <button class="bg-mode-btn bg-btn" onclick="setBg('black', this)">Black</button>
          <button class="bg-mode-btn bg-btn" onclick="setBg('white', this)">White</button>
        </div>
      </div>

      <div>
        <div class="section-title">Actions</div>
        <div style="display:flex; flex-direction: row; gap:0.5rem; flex-wrap: wrap;">
          <button class="action-btn" onclick="undo()">
            <span style="font-size:1.1rem;">↩️</span> Undo
          </button>
          <button class="action-btn" onclick="redo()">
            <span style="font-size:1.1rem;">↪️</span> Redo
          </button>
          <button class="action-btn" onclick="setColor('eraser', this)">
            <span style="font-size:1.1rem;">🧽</span> Eraser
          </button>
          <button class="action-btn success" onclick="saveImage()">
            <span style="font-size:1.1rem;">💾</span> Save
          </button>
          <button class="action-btn danger" style="flex: 1 1 100%;" onclick="clearCanvas()">
            <span style="font-size:1.1rem;">🗑️</span> Clear All
          </button>
        </div>
      </div>

    </div>

    <div class="feed-container">
      <div class="status-badge">
        <div class="pulse"></div> Tracking Active
      </div>
      <video id="videoElement" autoplay playsinline style="display:none; transform: scaleX(-1);"></video>
      <canvas id="outputCanvas" style="width: 100%; height: 100%; object-fit: cover;"></canvas>
    </div>
  </div>

  <div id="paletteModal" class="modal-overlay" style="display:none;">
    <div class="palette-modal">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h3 style="margin:0; font-size:1.1rem; color:#fff;">Advanced Hex Palette</h3>
        <button onclick="closePaletteModal()" style="background:none; border:none; color:#94A3B8; font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
      </div>
      <canvas id="hexPaletteCanvas" width="340" height="340" onclick="pickFromHexPalette(event)" style="cursor:crosshair; border-radius:50%;"></canvas>
    </div>
  </div>

  <script>
    function setColor(colorName, btn) {
      if(btn && colorName !== 'eraser') {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('colorPickerWrapper').classList.remove('active');
        btn.classList.add('active');
        document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
      } else if (btn && colorName === 'eraser') {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('colorPickerWrapper').classList.remove('active');
        btn.classList.add('active');
      }
      
      fetch(`/set_color/${colorName}`)
        .then(res => res.json())
        .then(data => console.log('Color set:', data));
    }

    function setCustomColor(hexColor) {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
      
      const wrapper = document.getElementById('colorPickerWrapper');
      wrapper.classList.add('active');
      wrapper.style.setProperty('--current-custom-color', hexColor);
      
      const hex = hexColor.substring(1).toUpperCase(); // remove #
      fetch(`/set_color/hex_${hex}`)
        .then(res => res.json())
        .then(data => console.log('Custom color set:', data));
    }

    function clearCanvas() {
      fetch('/clear')
        .then(res => res.json())
        .then(data => console.log('Canvas cleared:', data));
    }

    function undo() {
      fetch('/undo')
        .then(res => res.json())
        .then(data => console.log('Undo triggered:', data));
    }

    function redo() {
      fetch('/redo')
        .then(res => res.json())
        .then(data => console.log('Redo triggered:', data));
    }

    function setThickness(val) {
      document.getElementById('brushSizeViewer').innerText = val + 'px';
      fetch(`/set_thickness/${val}`);
    }

    function setBg(mode, btn) {
      document.querySelectorAll('.bg-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fetch(`/set_bg/${mode}`);
    }

    function setStyle(mode, btn) {
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fetch(`/set_style/${mode}`);
    }

    function openPaletteModal() {
      document.getElementById('paletteModal').style.display = 'flex';
      drawHexPalette();
    }

    function closePaletteModal() {
      document.getElementById('paletteModal').style.display = 'none';
    }

    function drawHexagon(ctx, x, y, r, color) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = Math.PI / 3 * i + Math.PI / 6;
            const hx = x + r * Math.cos(angle);
            const hy = y + r * Math.sin(angle);
            if (i === 0) ctx.moveTo(hx, hy);
            else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
    }

    function drawHexPalette() {
        const canvas = document.getElementById('hexPaletteCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        
        ctx.clearRect(0, 0, width, height);
        
        const rings = 12;
        const hexRadius = (width / 2.2) / (rings * Math.sqrt(3));
        const cx = width / 2;
        const cy = height / 2;
        
        for (let q = -rings; q <= rings; q++) {
            let r1 = Math.max(-rings, -q - rings);
            let r2 = Math.min(rings, -q + rings);
            for (let r = r1; r <= r2; r++) {
                let x = cx + hexRadius * Math.sqrt(3) * (q + r/2);
                let y = cy + hexRadius * 3/2 * r;
                
                let angle = Math.atan2(r * Math.sqrt(3)/2, q + r/2);
                let dist = Math.sqrt(q*q + r*r + q*r) / rings; 
                let hue = angle * 180 / Math.PI;
                if (hue < 0) hue += 360;
                
                let lightness = 100 - dist * 50; 
                
                drawHexagon(ctx, x, y, hexRadius - 0.3, `hsl(${hue}, 100%, ${lightness}%)`);
            }
        }
    }

    function pickFromHexPalette(e) {
        const canvas = document.getElementById('hexPaletteCanvas');
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        
        const p = ctx.getImageData(x, y, 1, 1).data;
        if (p[3] === 0) return;
        
        const rgbToHex = (r, g, b) => "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
        const hex = rgbToHex(p[0], p[1], p[2]);
        
        document.getElementById('customColorPicker').value = hex;
        setCustomColor(hex);
        closePaletteModal();
    }

    function saveImage() {
      // Trigger a raw download using the save_image endpoint
      window.open('/save_image', '_blank');
    }
  </script>
  <script type="module" src="/main.ts"></script>
</body>
</html>
